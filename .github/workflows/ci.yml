name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

jobs:
  build-and-push:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: domaj-server
            context: ./domaj-server
          - component: domaj-agent
            context: ./domaj-agent
          - component: domaj-web
            context: ./domaj-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          REGISTRY="${{ secrets.HARBOR_URL }}"
          PROJECT="${{ env.HARBOR_PROJECT }}"
          COMPONENT="${{ matrix.component }}"
          BASE="${REGISTRY}/${PROJECT}/${COMPONENT}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          TAGS="${BASE}:sha-${SHA_SHORT}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${BASE}:latest,${BASE}:main"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          BUILD_ARGS=""
          for TAG in "${TAG_ARRAY[@]}"; do
            BUILD_ARGS="${BUILD_ARGS} -t ${TAG}"
          done
          docker build ${BUILD_ARGS} ${{ matrix.context }}
          for TAG in "${TAG_ARRAY[@]}"; do
            docker push "${TAG}"
          done

  security-audit:
    name: Security Audit (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [domaj-server, domaj-agent]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: ./${{ matrix.component }}
        # RUSTSEC-2023-0071: rsa Marvin Attack - no fix available, comes from sqlx-mysql (unused)
        run: cargo audit --ignore RUSTSEC-2023-0071
