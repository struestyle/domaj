name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}

jobs:
  build-and-push:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: domaj-server
            context: ./domaj-server
          - component: domaj-agent
            context: ./domaj-agent
          - component: domaj-web
            context: ./domaj-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          REGISTRY="${{ secrets.HARBOR_URL }}"
          PROJECT="${{ env.HARBOR_PROJECT }}"
          COMPONENT="${{ matrix.component }}"
          BASE="${REGISTRY}/${PROJECT}/${COMPONENT}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          TAGS="${BASE}:sha-${SHA_SHORT}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${BASE}:latest,${BASE}:main"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  security-audit:
    name: Security Audit (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [domaj-server, domaj-agent]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm cargo-audit

      - name: Run cargo audit
        working-directory: ./${{ matrix.component }}
        # RUSTSEC-2023-0071: rsa Marvin Attack - no fix available, comes from sqlx-mysql (unused)
        run: cargo audit --ignore RUSTSEC-2023-0071
