services:
  postgres:
    image: postgres:17-alpine
    container_name: domaj-postgres
    environment:
      POSTGRES_DB: domaj
      POSTGRES_USER: domaj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domaj-secret}
    volumes:
      - domaj-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U domaj" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: domaj-server/Dockerfile
    container_name: domaj-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - domaj-server.env
    environment:
      DATABASE_URL: postgres://domaj:${POSTGRES_PASSWORD:-domaj-secret}@postgres:5432/domaj

  agent:
    build:
      context: ./domaj-agent
      dockerfile: Dockerfile
    container_name: domaj-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-3001}:3001"
    env_file:
      - domaj-agent.env

volumes:
  domaj-pgdata:
    driver: local
