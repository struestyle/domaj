services:
  server:
    image: hb.louislelievre.fr/domaj/domaj-server:latest
    container_name: domaj-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - domaj-data:/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - domaj-network
    env_file:
      - domaj-server.env

  web:
    image: hb.louislelievre.fr/domaj/domaj-web:latest
    container_name: domaj-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - domaj-network
    env_file:
      - domaj-web.env

  agent:
    image: hb.louislelievre.fr/domaj/domaj-agent:latest
    container_name: domaj-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - domaj-network
    env_file:
      - domaj-agent.env

volumes:
  domaj-data:
    driver: local

networks:
  domaj-network:
    driver: bridge
