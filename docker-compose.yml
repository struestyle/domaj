services:
  server:
    build:
      context: ./domaj-server
      dockerfile: Dockerfile
    container_name: domaj-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - domaj-data:/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - domaj-network
    env_file:
      - domaj-server.env
  web:
    build:
      context: ./domaj-web
      dockerfile: Dockerfile
    container_name: domaj-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - domaj-network
    env_file:
      - domaj-web.env
volumes:
  domaj-data:
    driver: local
networks:
  domaj-network:
    driver: bridge
